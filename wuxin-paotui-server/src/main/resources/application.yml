server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/wuxin_paotui?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

wuxin:
  wechat-mini-program:
    enabled: ${WECHAT_MINI_PROGRAM_ENABLED:false}
    app-id: ${WECHAT_MINI_PROGRAM_APP_ID:}
    app-secret: ${WECHAT_MINI_PROGRAM_APP_SECRET:}
  mock-wechat-login:
    enabled: ${MOCK_WECHAT_LOGIN_ENABLED:false}
  mock-wechat-phone:
    enabled: ${MOCK_WECHAT_PHONE_ENABLED:false}
  wechat-pay:
    enabled: ${WECHAT_PAY_ENABLED:false}
    app-id: ${WECHAT_PAY_APP_ID:}
    mch-id: ${WECHAT_PAY_MCH_ID:}
    merchant-serial-number: ${WECHAT_PAY_MERCHANT_SERIAL_NUMBER:}
    private-key-path: ${WECHAT_PAY_PRIVATE_KEY_PATH:}
    api-v3-key: ${WECHAT_PAY_API_V3_KEY:}
    notify-url: ${WECHAT_PAY_NOTIFY_URL:}
  mock-payment:
    enabled: ${MOCK_PAYMENT_ENABLED:true}
